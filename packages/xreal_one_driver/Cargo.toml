[package]
name = "xreal_one_driver"
version = "0.1.0"
edition = "2021"

[dependencies]
hidapi = "2.6.3"
anyhow = "1.0.99"
crc-adler = "0.1.1"
bytemuck = { version = "1.23.2", features = ["derive"] }
modular-bitfield = "0.12.0"
protobuf = "=3.5.0"
binrw = "0.14"
lzokay-native = { version = "0.1.0", features = ["decompress"] }
tokio = { version = "1.47.1", features = ["sync", "net", "io-util"] }
strum = { version = "0.27.2", features = ["derive"] }
futures = "0.3.31"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
nalgebra = "0.34.1"
time = { version = "0.3.44", features = ["macros", "serde", "parsing"] }

[dev-dependencies]
hexdump = "0.1.2"
