[package]
name = "xreal_one_driver"
version = "0.1.0"
edition = "2021"

[[bin]]
path = "bin/xreal_one_ctl.rs"
name = "xreal_one_ctl"

[dependencies]
hidapi = "2.6.3"
anyhow = "1.0.99"
crc-adler = "0.1.1"
bytemuck = { version = "1.23.2", features = ["derive"] }
modular-bitfield = "0.12.0"
protobuf = "=3.5.0"
binrw = "0.14"
lzokay-native = { version = "0.1.0", features = ["decompress"] }
tokio = { version = "1.47.1", features = ["net", "io-util", "sync", "macros", "rt", "time"] }
clap = { version = "4.5.48", features = ["derive"] }
indicatif = "0.18.0"
strum = { version = "0.27.2", features = ["derive"] }

hexdump = "0.1.2"

[dev-dependencies]

[build-dependencies]
protobuf-codegen = "=3.5.0"
glob = "0.3.1"